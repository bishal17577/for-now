<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>Sign In — Simha</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#ffffff; color:#111111;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px 16px; -webkit-font-smoothing:antialiased;
}
.card {
  width:100%; max-width:380px; background:#ffffff;
  border:1px solid #e8e8e8; border-radius:18px; padding:40px 32px 36px;
}
.brand { text-align:center; margin-bottom:36px; }
.brand .icon { font-size:52px; display:block; margin-bottom:10px; line-height:1; }
.brand h1 { font-size:26px; font-weight:800; color:#111111; letter-spacing:-.5px; margin-bottom:4px; }
.brand p { font-size:13px; color:#888888; }

/* Google button */
.btn-google {
  width:100%; padding:13px 16px; background:#ffffff; color:#111111;
  border:1.5px solid #d8d8d8; border-radius:11px;
  font-size:14px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif;
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition:border-color .15s,background .15s;
}
.btn-google:hover:not(:disabled) { border-color:#aaaaaa; background:#fafafa; }
.btn-google:disabled { opacity:.5; cursor:not-allowed; }
.btn-google .spinner {
  display:none; width:18px; height:18px;
  border:2px solid #dddddd; border-top-color:#111111;
  border-radius:50%; animation:spin .6s linear infinite; flex-shrink:0;
}
.btn-google.loading .btn-text,.btn-google.loading .btn-icon { display:none; }
.btn-google.loading .spinner { display:block; }
@keyframes spin { to { transform:rotate(360deg); } }

.divider {
  display:flex; align-items:center; gap:12px;
  margin:22px 0; color:#cccccc; font-size:12px;
}
.divider::before,.divider::after { content:''; flex:1; height:1px; background:#eeeeee; }

/* Status box */
.status-box {
  display:none; padding:12px 14px; border-radius:10px;
  font-size:13px; font-weight:500; margin-bottom:14px; line-height:1.5;
}
.status-box.show { display:block; }
.status-box.info    { background:#eff6ff; color:#1e40af; border:1px solid #bfdbfe; }
.status-box.success { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
.status-box.error   { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }

/* User section */
.user-section { display:none; }
.user-avatar-wrap { display:flex; flex-direction:column; align-items:center; text-align:center; padding:4px 0 20px; }
.user-avatar { width:68px; height:68px; border-radius:50%; object-fit:cover; border:2px solid #eeeeee; margin-bottom:12px; display:block; background:#f5f5f5; }
.user-name { font-size:17px; font-weight:700; color:#111111; margin-bottom:3px; }
.user-email { font-size:13px; color:#888888; margin-bottom:10px; }
.role-pill { display:inline-block; padding:3px 12px; border-radius:99px; font-size:11px; font-weight:600; background:#f2f2f2; color:#444444; border:1px solid #e8e8e8; text-transform:capitalize; }

.btn-primary { width:100%; padding:13px; background:#111111; color:#ffffff; border:none; border-radius:11px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:opacity .15s; margin-bottom:10px; }
.btn-primary:hover { opacity:.82; }
.btn-outline { width:100%; padding:13px; background:transparent; color:#555555; border:1.5px solid #e0e0e0; border-radius:11px; font-size:14px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif; transition:border-color .15s,background .15s; }
.btn-outline:hover { border-color:#bbbbbb; background:#fafafa; }

.footer-note { text-align:center; margin-top:24px; font-size:11px; color:#aaaaaa; line-height:1.6; }
.footer-note a { color:#888888; text-decoration:underline; }

/* Toasts */
#toasts { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:9999; width:min(360px,90vw); display:flex; flex-direction:column; gap:6px; pointer-events:none; }
.toast { background:#111111; color:#ffffff; padding:11px 16px; border-radius:10px; font-size:13px; font-weight:500; font-family:'Inter',sans-serif; pointer-events:auto; animation:tUp .2s ease; display:flex; align-items:center; gap:8px; }
.toast.error { background:#b91c1c; }
.toast.warning { background:#92400e; }
@keyframes tUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;} }

@media(max-width:420px){
  .card { border:none; border-radius:0; padding:40px 20px 32px; max-width:100%; min-height:100vh; justify-content:center; display:flex; flex-direction:column; }
}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="icon">🦁</span>
    <h1>Simha</h1>
    <p>All Shops, One Place</p>
  </div>

  <!-- Status message -->
  <div class="status-box" id="statusBox"></div>

  <!-- Login -->
  <div id="loginSection">
    <button class="btn-google" id="googleBtn" onclick="handleGoogleLogin()">
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span class="btn-text">Continue with Google</span>
      <span class="spinner"></span>
    </button>
    <div class="divider">sign in to continue</div>
    <p style="text-align:center;font-size:12px;color:#aaaaaa;line-height:1.6;">
      Browse local shops, place orders, or manage your store.
    </p>
  </div>

  <!-- Logged in -->
  <div class="user-section" id="userSection">
    <div class="user-avatar-wrap">
      <img class="user-avatar" id="userAvatar" src="" alt="Profile">
      <div class="user-name" id="userName"></div>
      <div class="user-email" id="userEmail"></div>
      <span class="role-pill" id="userRole">customer</span>
    </div>
    <button class="btn-primary" onclick="goToDashboard()">Continue →</button>
    <button class="btn-outline" onclick="handleLogout()">Sign out</button>
  </div>

  <p class="footer-note">By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>.</p>
</div>

<div id="toasts"></div>

<script type="importmap">
{
  "imports": {
    "firebase/app":       "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
    "firebase/auth":      "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
  }
}
</script>

<script type="module">
import { initializeApp }                                        from 'firebase/app';
import { getAuth, signInWithPopup, GoogleAuthProvider,
         onAuthStateChanged, signOut, setPersistence,
         browserLocalPersistence }                             from 'firebase/auth';
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'firebase/firestore';

/* ── CONFIG ── */
const firebaseConfig = {
  apiKey:            "AIzaSyDJLnUB8XnXWPEtSRAMuQr9ASmD16HLIJc",
  authDomain:        "bishalshrestha17-de676.firebaseapp.com",
  projectId:         "bishalshrestha17-de676",
  storageBucket:     "bishalshrestha17-de676.firebasestorage.app",
  messagingSenderId: "631628771230",
  appId:             "1:631628771230:web:389c6430535f6a46b6708f"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

setPersistence(auth, browserLocalPersistence).catch(() => {});

/* ── HELPERS ── */
function toast(msg, type = 'success') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity .2s,transform .2s';
    t.style.opacity = '0'; t.style.transform = 'translateY(6px)';
    setTimeout(() => t.remove(), 220);
  }, 3500);
}

function setStatus(msg, type = 'info') {
  const box = document.getElementById('statusBox');
  box.textContent = msg;
  box.className = `status-box show ${type}`;
}
function clearStatus() {
  document.getElementById('statusBox').className = 'status-box';
}

/* ── SAVE USER TO FIRESTORE ──
   Uses setDoc with merge:true so:
   - New user  → creates the document with all fields
   - Old user  → only updates name/photo/updatedAt, never overwrites role/shopId
*/
async function saveUserToFirestore(user) {
  const ref = doc(db, 'users', user.uid);

  // First check if already exists
  let snap;
  try {
    snap = await getDoc(ref);
  } catch (e) {
    // Read failed — likely rules issue
    throw new Error('read-failed:' + e.code);
  }

  if (snap.exists()) {
    // Existing user — just update last-seen fields, keep role intact
    await setDoc(ref, {
      name:            user.displayName || snap.data().name || 'User',
      email:           user.email       || snap.data().email || '',
      profilePhotoURL: user.photoURL    || snap.data().profilePhotoURL || '',
      updatedAt:       serverTimestamp()
    }, { merge: true });
    return { isNew: false, role: snap.data().role || 'customer' };
  }

  // Brand-new user — write full document
  const newUser = {
    uid:               user.uid,
    name:              user.displayName  || 'User',
    email:             user.email        || '',
    phone:             user.phoneNumber  || '',
    role:              'customer',               // default role
    profilePhotoURL:   user.photoURL     || '',
    createdAt:         serverTimestamp(),
    updatedAt:         serverTimestamp(),
    emailVerified:     user.emailVerified || false,
    favorites:         [],
    readNotifications: []
  };

  await setDoc(ref, newUser);   // no merge needed for new doc
  return { isNew: true, role: 'customer' };
}

/* ── REDIRECT BY ROLE ── */
async function redirectByRole(uid) {
  try {
    const snap = await getDoc(doc(db, 'users', uid));
    const role = snap.exists() ? (snap.data().role || 'customer') : 'customer';
    if      (role === 'admin') location.replace('admin.html');
    else if (role === 'shop')  location.replace('shop-dashboard.html');
    else                       location.replace('index.html');
  } catch {
    location.replace('index.html');
  }
}

/* ── SHOW LOGGED-IN UI ── */
async function showUser(user) {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('userSection').style.display  = 'block';
  document.getElementById('userAvatar').src             = user.photoURL || '';
  document.getElementById('userName').textContent       = user.displayName || 'User';
  document.getElementById('userEmail').textContent      = user.email || '';
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      document.getElementById('userRole').textContent = snap.data().role || 'customer';
    }
  } catch {}
}

/* ── GOOGLE LOGIN ── */
window.handleGoogleLogin = async function () {
  const btn = document.getElementById('googleBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  clearStatus();

  try {
    /* Step 1 — Google popup */
    setStatus('Opening Google sign-in…', 'info');
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    const result = await signInWithPopup(auth, provider);
    const user   = result.user;

    /* Step 2 — Save to Firestore */
    setStatus('Saving your account…', 'info');
    let saveResult;
    try {
      saveResult = await saveUserToFirestore(user);
    } catch (saveErr) {
      // Firestore write failed — tell user exactly why
      if (saveErr.message.includes('permission-denied') || saveErr.message.includes('read-failed:permission-denied')) {
        setStatus(
          '⚠️ Firestore permission denied.\n\nGo to Firebase Console → Firestore → Rules and paste:\n\nallow read, write: if request.auth != null;',
          'error'
        );
      } else {
        setStatus('⚠️ Could not save account: ' + saveErr.message, 'error');
      }
      // Show user section anyway — auth worked even if Firestore failed
      showUser(user);
      return;
    }

    /* Step 3 — Redirect */
    if (saveResult.isNew) {
      toast('Account created! Welcome 🎉');
    } else {
      toast('Welcome back! 👋');
    }
    clearStatus();

    // Small delay so toast is visible, then redirect
    setTimeout(() => redirectByRole(user.uid), 900);

  } catch (err) {
    clearStatus();
    let msg = 'Sign in failed. Please try again.';
    if (err.code === 'auth/popup-closed-by-user')     msg = 'Sign in cancelled.';
    else if (err.code === 'auth/popup-blocked')       msg = 'Popup blocked — please allow popups for this site.';
    else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your connection.';
    toast(msg, 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
};

/* ── DASHBOARD BUTTON ── */
window.goToDashboard = function () {
  const user = auth.currentUser;
  if (user) redirectByRole(user.uid);
};

/* ── LOGOUT ── */
window.handleLogout = async function () {
  try {
    await signOut(auth);
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('userSection').style.display  = 'none';
    clearStatus();
    toast('Signed out');
  } catch {
    toast('Sign out failed', 'error');
  }
};

/* ── AUTH STATE ──
   If already logged in when page loads → redirect immediately.
   onAuthStateChanged fires before any user interaction, so this
   catches returning users without showing the login screen at all.
*/
let authResolved = false;
onAuthStateChanged(auth, async (user) => {
  if (authResolved) return;   // prevent double-fire
  authResolved = true;

  if (user) {
    // Returning session — go straight to app
    try {
      // Silently refresh the user doc (update name/photo if changed)
      await saveUserToFirestore(user);
    } catch {}
    redirectByRole(user.uid);
  } else {
    // Not logged in — show the sign-in button
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('userSection').style.display  = 'none';
  }
});
</script>
</body>
</html>
