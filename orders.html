<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Orders - Simha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --border: #e8ecf0;
            --ink: #0d0d0d;
            --ink-2: #6b727a;
            --accent: #0a6b5e;
            --accent-2: #e63b2e;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-xs: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-sm: 0 2px 12px rgba(0,0,0,0.06);
            --transition: 0.3s cubic-bezier(0.25,0.1,0.25,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--ink);
            width: 100%; min-height: 100vh; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .app { max-width: 1200px; margin: 0 auto; background: var(--bg); padding: 0 16px 80px; }

        /* TOP NAV (desktop) */
        .top-nav {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 0 20px; height: 56px;
            display: none; align-items: center; justify-content: space-between;
            border-radius: 0 0 12px 12px; margin-bottom: 16px;
        }
        .top-nav .logo { font-size: 20px; font-weight: 800; color: var(--ink); display: flex; align-items: center; gap: 6px; }
        .top-nav .logo span { color: var(--accent); }
        .top-nav .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
        .top-nav .nav-links a {
            font-size: 14px; font-weight: 500; color: var(--ink-2); transition: color 0.2s;
            padding: 4px 0; position: relative; text-decoration: none;
        }
        .top-nav .nav-links a::after {
            content: ''; position: absolute; bottom: -2px; left: 0;
            width: 0; height: 2px; background: var(--accent); transition: width var(--transition);
        }
        .top-nav .nav-links a:hover::after, .top-nav .nav-links a.active::after { width: 100%; }
        .top-nav .nav-links a:hover, .top-nav .nav-links a.active { color: var(--ink); font-weight: 600; }
        .top-nav .nav-actions { display: flex; gap: 10px; align-items: center; }
        .top-nav .nav-actions .profile-btn {
            width: 36px; height: 36px; border-radius: 50%; background: var(--bg);
            border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; cursor: pointer; transition: border-color 0.2s;
            color: var(--ink); overflow: hidden;
        }
        .top-nav .nav-actions .profile-btn:hover { border-color: var(--accent); }
        .top-nav .nav-actions .profile-btn img { width: 100%; height: 100%; object-fit: cover; }
        .top-nav .nav-actions .notif-btn {
            position: relative; font-size: 18px; cursor: pointer; padding: 4px;
            min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: background 0.2s; background: none; border: none; color: var(--ink);
        }
        .top-nav .nav-actions .notif-btn:hover { background: var(--bg); }
        .top-nav .nav-actions .notif-btn .badge {
            position: absolute; top: 0; right: 0; background: var(--accent-2); color: #fff;
            font-size: 8px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%;
            display: none; align-items: center; justify-content: center; border: 2px solid var(--surface);
        }
        .top-nav .nav-actions .notif-btn .badge.show { display: flex; }
        @media (min-width: 768px) { .top-nav { display: flex; } .app { padding: 0 24px 20px; } }

        /* MOBILE HEADER */
        .header {
            background: var(--surface); padding: 8px 14px 10px;
            border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px;
            border-radius: 0 0 12px 12px; margin-bottom: 12px;
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; }
        .header-top .brand h1 { font-size: 17px; font-weight: 800; color: var(--ink); display: flex; align-items: center; gap: 4px; }
        .header-top .brand h1 span { color: var(--accent); }
        .header-top .actions { display: flex; gap: 4px; align-items: center; }
        .header-top .actions button {
            width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.04);
            color: var(--ink); font-size: 16px; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; position: relative; border: none;
        }
        .header-top .actions button:active { background: rgba(0,0,0,0.1); }
        .header-top .actions button .badge {
            position: absolute; top: -2px; right: -2px; background: var(--accent-2); color: #fff;
            font-size: 8px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%;
            display: none; align-items: center; justify-content: center; border: 2px solid var(--surface);
        }
        .header-top .actions button .badge.show { display: flex; }
        @media (min-width: 768px) { .header { display: none; } }

        /* PAGE HEADER */
        .page-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin: 12px 0 8px; }
        .page-header h1 { font-size: 24px; font-weight: 800; }
        .page-header .count-badge { background: var(--accent); color: #fff; padding: 2px 12px; border-radius: 40px; font-size: 13px; font-weight: 600; }

        /* FILTER TABS */
        .filter-tabs {
            display: flex; gap: 4px; overflow-x: auto; padding: 4px 0 12px;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
            border-bottom: 1px solid var(--border); margin-bottom: 16px;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .filter-tab {
            flex-shrink: 0; padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: 500;
            color: var(--ink-2); border: 1px solid transparent; transition: all 0.2s;
            cursor: pointer; background: none; font-family: 'Inter', sans-serif;
        }
        .filter-tab:hover { color: var(--ink); border-color: var(--border); }
        .filter-tab.active { color: #fff; background: var(--ink); border-color: var(--ink); }
        .filter-tab .count { font-size: 10px; opacity: 0.7; margin-left: 4px; }

        /* ORDER CARDS */
        .order-card {
            background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border);
            margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow-xs); transition: box-shadow 0.2s;
        }
        .order-card:hover { box-shadow: var(--shadow-sm); }
        .order-card .order-header {
            padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 8px; cursor: pointer; border-bottom: 1px solid #f0f2f5; transition: background 0.1s;
        }
        .order-card .order-header:hover { background: #fafbfc; }
        .order-card .order-header .order-id { font-weight: 600; font-size: 14px; }
        .order-card .order-header .order-date { font-size: 12px; color: var(--ink-2); }
        .order-card .order-header .order-status {
            font-size: 11px; font-weight: 600; padding: 3px 12px; border-radius: 50px; text-transform: capitalize;
        }
        .order-status.pending   { background: #fef3c7; color: #92400e; }
        .order-status.confirmed { background: #dbeafe; color: #1e40af; }
        .order-status.shipped   { background: #e0f2fe; color: #0369a1; }
        .order-status.delivered { background: #d1fae5; color: #065f46; }
        .order-status.cancelled { background: #fee2e2; color: #991b1b; }

        .order-card .order-body { padding: 14px 16px; display: none; border-bottom: 1px solid #f0f2f5; }
        .order-card .order-body.expanded { display: block; }
        .order-card .order-body .order-shop { font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        .order-card .order-body .order-item {
            display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f5f6f8;
        }
        .order-card .order-body .order-item:last-of-type { border-bottom: none; }
        .order-card .order-body .order-item img { width: 40px; height: 40px; border-radius: var(--radius-sm); object-fit: cover; background: #f0f2f5; }
        .order-card .order-body .order-item .item-details { flex: 1; }
        .order-card .order-body .order-item .item-details .name { font-size: 13px; font-weight: 500; }
        .order-card .order-body .order-item .item-details .qty { font-size: 12px; color: var(--ink-2); }
        .order-card .order-body .order-item .item-price { font-weight: 600; font-size: 13px; }

        /* TRACKING STEPPER */
        .tracking-stepper { padding: 8px 0 4px; margin-top: 8px; border-top: 1px solid #f0f2f5; }
        .tracking-step { display: flex; align-items: flex-start; gap: 12px; padding: 6px 0; position: relative; }
        .tracking-step .step-dot {
            width: 12px; height: 12px; border-radius: 50%; background: var(--border);
            flex-shrink: 0; margin-top: 2px; border: 2px solid var(--border); transition: all 0.3s;
        }
        .tracking-step .step-dot.active   { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(10,107,94,0.15); }
        .tracking-step .step-dot.completed { background: var(--accent); border-color: var(--accent); }
        .tracking-step .step-dot.inactive  { opacity: 0.4; }
        .tracking-step .step-line { position: absolute; left: 5px; top: 22px; width: 2px; height: 16px; background: var(--border); }
        .tracking-step:last-child .step-line { display: none; }
        .tracking-step .step-label { font-size: 13px; }
        .tracking-step .step-label .step-date { font-size: 11px; color: var(--ink-2); display: block; }

        /* ORDER FOOTER */
        .order-card .order-footer {
            padding: 10px 16px; background: #fafbfc;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
        }
        .order-card .order-footer .total { font-weight: 700; font-size: 16px; }
        .order-card .order-footer .actions { display: flex; gap: 8px; flex-wrap: wrap; }

        /* BUTTONS */
        .btn-primary  { padding: 8px 18px; background: var(--accent);   color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 600; font-size: 12px; cursor: pointer; transition: opacity 0.2s; font-family: 'Inter', sans-serif; }
        .btn-secondary{ padding: 8px 18px; background: transparent; color: var(--ink); border: 1px solid var(--border); border-radius: var(--radius-sm); font-weight: 500; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .btn-danger   { padding: 8px 18px; background: var(--accent-2); color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 600; font-size: 12px; cursor: pointer; transition: opacity 0.2s; font-family: 'Inter', sans-serif; }
        .btn-whatsapp { padding: 8px 18px; background: #25D366; color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 600; font-size: 12px; cursor: pointer; transition: opacity 0.2s; font-family: 'Inter', sans-serif; }
        .btn-primary:hover, .btn-danger:hover, .btn-whatsapp:hover { opacity: 0.85; }
        .btn-secondary:hover { border-color: var(--ink); background: #f4f6f8; }
        .btn-primary:disabled, .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-2); }
        .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
        .empty-state h2 { color: var(--ink); font-size: 22px; margin-bottom: 4px; }
        .empty-state p { font-size: 14px; margin-bottom: 16px; }

        /* TOAST */
        #toastContainer {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 9999;
            width: 92%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none;
        }
        .toast {
            background: #1e2226; color: #fff; padding: 12px 18px; border-radius: 12px;
            text-align: center; font-size: 13px; font-weight: 500; width: 100%;
            pointer-events: auto; animation: slideUp 0.3s ease;
        }
        .toast.success { background: #0b2e1a; }
        .toast.error   { background: #7a1a1a; }
        .toast.warning { background: #6b4f00; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.96); backdrop-filter: blur(14px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 6px 0 10px; z-index: 99;
        }
        .bottom-nav .nav-item {
            display: flex; flex-direction: column; align-items: center; font-size: 9px;
            color: var(--ink-2); transition: color 0.2s; cursor: pointer; gap: 1px;
            background: none; border: none; font-family: 'Inter', sans-serif;
            position: relative; text-decoration: none; padding: 2px 6px;
        }
        .bottom-nav .nav-item .icon { font-size: 20px; }
        .bottom-nav .nav-item.active { color: var(--accent); }
        .bottom-nav .nav-item .badge {
            position: absolute; top: -2px; right: -4px; background: var(--accent-2); color: #fff;
            font-size: 7px; font-weight: 700; min-width: 12px; height: 12px; border-radius: 50%;
            display: none; align-items: center; justify-content: center; padding: 0 2px;
        }
        .bottom-nav .nav-item .badge.show { display: flex; }
        @media (min-width: 768px) { .bottom-nav { display: none !important; } }
    </style>
</head>

<script type="importmap">
{
    "imports": {
        "firebase/app":       "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "firebase/auth":      "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",

}

<script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged } from 'firebase/auth';
    import {
        getFirestore, collection, doc, getDocs, getDoc, updateDoc, setDoc,
        query, where, onSnapshot, serverTimestamp, runTransaction
    } from 'firebase/firestore';

    const firebaseConfig = {
        apiKey: "AIzaSyDJLnUB8XnXWPEtSRAMuQr9ASmD16HLIJc",
        authDomain: "bishalshrestha17-de676.firebaseapp.com",
        projectId: "bishalshrestha17-de676",
        storageBucket: "bishalshrestha17-de676.firebasestorage.app",
        messagingSenderId: "631628771230",
        appId: "1:631628771230:web:389c6430535f6a46b6708f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── STATE ────────────────────────────────────────────────────
    // FIX: allOrdersData holds EVERY order; allOrders is the displayed slice
    let allOrdersData = [];   // full list from Firestore (all pages)
    let displayedOrders = []; // currently rendered (may be paged)
    let currentFilter = 'all';
    let unsubscribeOrders = null;
    const PAGE_SIZE = 10;

    const ordersList  = document.getElementById('ordersList');
    const loadMoreBtn = document.getElementById('loadMoreBtn');

    // ── TOAST ────────────────────────────────────────────────────
    function showToast(msg, type = 'success') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => {
            t.style.transition = 'opacity 0.3s, transform 0.3s';
            t.style.opacity = '0';
            t.style.transform = 'translateY(10px)';
            setTimeout(() => t.remove(), 300);
        }, 2800);
    }

    // ── DATE FORMATTER ───────────────────────────────────────────
    function formatDate(ts) {
        if (!ts) return 'N/A';
        let d;
        if (ts.toDate) d = ts.toDate();
        else if (ts.seconds) d = new Date(ts.seconds * 1000);
        else d = new Date(ts);
        if (isNaN(d.getTime())) return 'N/A';
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    // ── TRACKING STEPS ───────────────────────────────────────────
    function getTrackingSteps(status, createdAt, deliveredAt) {
        const steps = [
            { label: 'Order Placed', date: createdAt },
            { label: 'Confirmed',    date: ['confirmed','shipped','delivered'].includes(status) ? createdAt : null },
            { label: 'Shipped',      date: ['shipped','delivered'].includes(status) ? createdAt : null },
            { label: 'Delivered',    date: deliveredAt || null }
        ];
        const idx = { pending:0, confirmed:1, shipped:2, delivered:3, cancelled:-1 }[status] ?? 0;

        steps.forEach((s, i) => {
            if (status === 'cancelled') s.dotClass = i === 0 ? 'completed' : 'inactive';
            else if (i < idx)  s.dotClass = 'completed';
            else if (i === idx) s.dotClass = status === 'delivered' ? 'completed' : 'active';
            else s.dotClass = 'inactive';
        });

        return steps.map((s, i) => `
            <div class="tracking-step">
                <div class="step-dot ${s.dotClass}"></div>
                ${i < steps.length - 1 ? '<div class="step-line"></div>' : ''}
                <div class="step-label">
                    ${s.label}
                    ${s.date ? `<span class="step-date">${formatDate(s.date)}</span>` : ''}
                </div>
            </div>`).join('');
    }

    // ── RENDER ORDERS ────────────────────────────────────────────
    function renderOrders(orders) {
        if (orders.length === 0) {
            ordersList.innerHTML = `
                <div class="empty-state">
                    <span class="emoji">📋</span>
                    <h2>No orders found</h2>
                    <p>${currentFilter === 'all' ? 'Place your first order!' : `No ${currentFilter} orders`}</p>
                    <button class="btn-primary" onclick="window.location.href='shop-listing.html'">Browse Shops →</button>
                </div>`;
            return;
        }

        ordersList.innerHTML = orders.map(order => {
            const canCancel = !['cancelled','delivered'].includes(order.status);
            const isPendingOrCancelled = ['pending','cancelled'].includes(order.status);
            return `
            <div class="order-card">
                <div class="order-header" onclick="toggleOrder('${order.id}')">
                    <div>
                        <div class="order-id">${order.orderId || '#' + order.id.slice(0,8).toUpperCase()}</div>
                        <div class="order-date">${formatDate(order.createdAt)}</div>
                    </div>
                    <span class="order-status ${order.status || 'pending'}">${order.status || 'pending'}</span>
                </div>

                <div class="order-body" id="orderBody_${order.id}">
                    <div class="order-shop">🏪 ${order.shopName || 'Shop'}</div>
                    ${(order.items || []).map(item => `
                        <div class="order-item">
                            <img src="${item.imageURL || ''}" alt="${item.productName || ''}"
                                 onerror="this.src='https://picsum.photos/40/40'">
                            <div class="item-details">
                                <div class="name">${item.productName || 'Product'}</div>
                                <div class="qty">×${item.qty || 0} ${item.unit || ''}</div>
                            </div>
                            <div class="item-price">Rs. ${((item.price||0)*(item.qty||0)).toLocaleString()}</div>
                        </div>`).join('') || '<p style="color:var(--ink-2);font-size:13px;">No items</p>'}

                    <div class="tracking-stepper">
                        ${getTrackingSteps(order.status, order.createdAt, order.deliveredAt)}
                    </div>

                    ${order.cancelledAt ? `
                        <div style="margin-top:8px;padding:8px;background:#fee2e2;border-radius:6px;font-size:12px;color:#991b1b;">
                            Cancelled on: ${formatDate(order.cancelledAt)}
                        </div>` : ''}
                </div>

                <div class="order-footer">
                    <span class="total">Total: Rs. ${(order.totalAmount||0).toLocaleString()}</span>
                    <div class="actions">
                        ${canCancel ? `
                            <button class="btn-danger" data-cancel="${order.id}"
                                    onclick="cancelOrder('${order.id}')">❌ Cancel</button>` : ''}
                        ${isPendingOrCancelled ? `
                            <button class="btn-secondary" onclick="reorder('${order.id}')">🔄 Reorder</button>` : ''}
                        ${order.shopWhatsapp ? `
                            <button class="btn-whatsapp"
                                    onclick="contactShop('${order.shopWhatsapp}','${order.orderId||order.id}')">
                                💬 Contact</button>` : ''}
                        <button class="btn-secondary" onclick="toggleOrder('${order.id}')">📄 Details</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // ── TOGGLE ORDER BODY ────────────────────────────────────────
    window.toggleOrder = (id) => {
        document.getElementById(`orderBody_${id}`)?.classList.toggle('expanded');
    };

    // ── APPLY FILTER ─────────────────────────────────────────────
    // FIX: always filters from allOrdersData (full list), not just displayed page
    function applyFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.filter === filter);
        });

        const filtered = filter === 'all'
            ? allOrdersData
            : allOrdersData.filter(o => o.status === filter);

        // Show first page of filtered results
        displayedOrders = filtered.slice(0, PAGE_SIZE);
        renderOrders(displayedOrders);

        // Load More only if there are more in the filtered set
        if (filtered.length > PAGE_SIZE) {
            loadMoreBtn.style.display = 'inline-block';
            loadMoreBtn.dataset.total = filtered.length;
        } else {
            loadMoreBtn.style.display = 'none';
        }
    }

    // FIX: Attach filter tab clicks via JS, not inline onclick, so they stay in module scope
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => applyFilter(tab.dataset.filter));
    });

    // ── LOAD MORE ────────────────────────────────────────────────
    // FIX: respects current filter and uses correct source (allOrdersData filtered)
    loadMoreBtn.addEventListener('click', () => {
        const filtered = currentFilter === 'all'
            ? allOrdersData
            : allOrdersData.filter(o => o.status === currentFilter);

        const next = filtered.slice(displayedOrders.length, displayedOrders.length + PAGE_SIZE);
        displayedOrders = [...displayedOrders, ...next];
        renderOrders(displayedOrders);

        if (displayedOrders.length >= filtered.length) {
            loadMoreBtn.style.display = 'none';
        }
    });

    // ── UPDATE COUNT BADGES ──────────────────────────────────────
    function updateCounts() {
        const total = allOrdersData.length;
        document.getElementById('totalOrdersBadge').textContent = total;
        document.getElementById('countAll').textContent = total;

        ['pending','confirmed','shipped','delivered','cancelled'].forEach(s => {
            const el = document.getElementById(`count${s.charAt(0).toUpperCase()+s.slice(1)}`);
            if (el) el.textContent = allOrdersData.filter(o => o.status === s).length;
        });
    }

    // ── CANCEL ORDER ─────────────────────────────────────────────
    window.cancelOrder = async function(orderId) {
        if (!confirm('⚠️ Cancel this order?')) return;

        // FIX: search full allOrdersData, not just the displayed page
        const order = allOrdersData.find(o => o.id === orderId);
        if (!order) { showToast('Order not found', 'error'); return; }
        if (order.status === 'cancelled') { showToast('Already cancelled', 'warning'); return; }
        if (order.status === 'delivered') { showToast('Cannot cancel a delivered order', 'error'); return; }

        const btn = document.querySelector(`[data-cancel="${orderId}"]`);
        if (btn) { btn.disabled = true; btn.textContent = 'Cancelling…'; }

        try {
            await runTransaction(db, async (tx) => {
                // READ PHASE — all reads first
                const orderRef = doc(db, 'orders', orderId);
                const orderSnap = await tx.get(orderRef);
                if (!orderSnap.exists()) throw new Error('Order not found');
                const data = orderSnap.data();
                if (data.status === 'cancelled') throw new Error('Already cancelled');
                if (data.status === 'delivered') throw new Error('Cannot cancel delivered order');

                const items = data.items || [];
                const productSnaps = await Promise.all(
                    items.map(item => tx.get(doc(db, 'products', item.productId)))
                );

                // WRITE PHASE — all writes after all reads
                tx.update(orderRef, {
                    status: 'cancelled',
                    cancelledAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });

                productSnaps.forEach((snap, i) => {
                    if (snap.exists()) {
                        tx.update(snap.ref, {
                            stock: (snap.data().stock || 0) + (items[i].qty || 0),
                            updatedAt: serverTimestamp()
                        });
                    }
                });
            });

            showToast('✅ Order cancelled. Stock restored.', 'success');
        } catch (err) {
            console.error('Cancel error:', err);
            showToast('Failed to cancel: ' + err.message, 'error');
            if (btn) { btn.disabled = false; btn.textContent = '❌ Cancel'; }
        }
    };

    // ── REORDER ──────────────────────────────────────────────────
    window.reorder = async function(orderId) {
        const order = allOrdersData.find(o => o.id === orderId);
        if (!order?.items?.length) { showToast('No items to reorder', 'error'); return; }
        const user = auth.currentUser;
        if (!user) { showToast('Please login first', 'error'); return; }

        try {
            const cartRef  = doc(db, 'cart', user.uid);
            const cartSnap = await getDoc(cartRef);
            const existing = cartSnap.exists() ? (cartSnap.data().items || []) : [];
            const merged   = [...existing];

            for (const item of order.items) {
                const idx = merged.findIndex(i => i.productId === item.productId);
                if (idx >= 0) merged[idx].qty += item.qty || 0;
                else merged.push({
                    productId: item.productId,
                    shopId: order.shopId,
                    shopName: order.shopName || 'Shop',
                    productName: item.productName,
                    price: item.price,
                    qty: item.qty || 0,
                    unit: item.unit || '',
                    imageURL: item.imageURL || ''
                });
            }

            if (cartSnap.exists()) {
                await updateDoc(cartRef, { items: merged, updatedAt: serverTimestamp() });
            } else {
                await setDoc(cartRef, { items: merged, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
            }

            showToast('Added to cart! 🛒', 'success');
            window.location.href = 'cart.html';
        } catch (err) {
            console.error('Reorder error:', err);
            showToast('Failed to reorder', 'error');
        }
    };

    // ── CONTACT SHOP ─────────────────────────────────────────────
    window.contactShop = (whatsapp, orderId) => {
        const msg = `Hi, I have order ${orderId} on Simha. Can you help?`;
        window.open(`https://wa.me/977${whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
    };

    // ── REALTIME ORDERS LISTENER ─────────────────────────────────
    // FIX: only one listener at a time; no separate getDocs call — listener handles everything
    function setupRealtimeListener(user) {
        if (unsubscribeOrders) { unsubscribeOrders(); unsubscribeOrders = null; }

        const q = query(collection(db, 'orders'), where('customerId', '==', user.uid));

        unsubscribeOrders = onSnapshot(q, (snapshot) => {
            const orders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            orders.sort((a, b) => {
                const da = a.createdAt?.toDate?.() || new Date(0);
                const db_ = b.createdAt?.toDate?.() || new Date(0);
                return db_ - da;
            });

            allOrdersData = orders;
            updateCounts();
            applyFilter(currentFilter);  // re-render current filter view
        }, (err) => {
            console.error('Orders listener error:', err);
            showToast('Error loading orders', 'error');
        });
    }

    // ── NAV BADGES (cart + notifications) ───────────────────────
    async function updateNavBadges(user) {
        try {
            // Cart count
            const cartSnap = await getDoc(doc(db, 'cart', user.uid));
            const cartCount = cartSnap.exists()
                ? (cartSnap.data().items || []).reduce((s, i) => s + (i.qty || 0), 0) : 0;
            const cartBadge = document.getElementById('cartBadge');
            if (cartBadge) {
                cartBadge.textContent = cartCount > 99 ? '99+' : cartCount;
                cartBadge.classList.toggle('show', cartCount > 0);
            }

            // FIX: guard against missing isActive field on notifications
            const notifSnap = await getDocs(query(
                collection(db, 'notifications'),
                where('isActive', '==', true)
            ));
            const userSnap = await getDoc(doc(db, 'users', user.uid));
            const readList = userSnap.exists() ? (userSnap.data().readNotifications || []) : [];
            const unread   = Math.max(0, notifSnap.size - readList.length);

            ['notifBadge','notifBadgeMobile'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.textContent = unread > 99 ? '99+' : unread;
                    el.classList.toggle('show', unread > 0);
                }
            });
        } catch (e) {
            console.warn('Badge update error:', e);
        }
    }

    // ── PROFILE AVATAR ───────────────────────────────────────────
    function updateProfileAvatar(user) {
        const avatar = document.getElementById('profileAvatarNav');
        if (!avatar) return;
        if (user) {
            if (user.photoURL) avatar.innerHTML = `<img src="${user.photoURL}" alt="Profile">`;
            else avatar.textContent = (user.displayName || user.email || 'U').charAt(0).toUpperCase();
        } else {
            avatar.innerHTML = '👤';
        }
    }

    // ── AUTH STATE ───────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
        updateProfileAvatar(user);
        if (user) {
            // FIX: only use the realtime listener — no separate loadOrders() call
            setupRealtimeListener(user);
            updateNavBadges(user);
        } else {
            window.location.href = 'auth.html';
        }
    });
</script>
</body>
</html>
